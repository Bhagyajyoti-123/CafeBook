<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CafeBook Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="dashboard">
    <!-- Wallet -->
    <a href="wallet.html" class="section wallet">
      <i class="fa-solid fa-wallet fa-3x"></i>
      <h3>Wallet</h3>
    </a>

    <!-- Membership -->
    <a href="membership.html" class="section membership">
      <i class="fa-solid fa-ticket fa-3x"></i>
      <h3>Membership</h3>
    </a>

    <!-- Balance -->
    <a href="balance.html" class="section balance">
      <i class="fa-solid fa-chart-simple fa-3x"></i>
      <h3>Balance</h3>
    </a>

    <!-- Booking -->
    <a href="booking.html" class="section booking">
      <i class="fa-solid fa-mug-hot fa-3x"></i>
      <h3>Booking</h3>
    </a>

    <!-- Logout -->
    <a href="login.html" class="section user" onclick="logoutUser()">
      <i class="fa-solid fa-right-from-bracket fa-3x"></i>
      <h3>Logout</h3>
    </a>
  </div>

  <!-- JS link -->
  <script src="script.js"></script>
</body>
</html>
